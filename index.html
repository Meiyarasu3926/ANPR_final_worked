<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Smart LPR with Manual Entry</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }

        .header { background: rgba(255,255,255,0.95); padding: 12px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #4CAF50; }
        .logo { font-size: 22px; font-weight: bold; color: #2c3e50; display: flex; align-items: center; gap: 8px; }
        .status-bar { display: flex; gap: 12px; align-items: center; }
        .status-indicator { display: flex; align-items: center; gap: 5px; padding: 5px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; }
        .status-active { background: linear-gradient(45deg, #4CAF50, #45a049); color: white; }
        .status-inactive { background: linear-gradient(45deg, #f44336, #d32f2f); color: white; }
        .status-info { background: linear-gradient(45deg, #2196F3, #1976D2); color: white; }

        .main-container { display: grid; grid-template-columns: 3fr 1fr; gap: 15px; padding: 15px; height: calc(100vh - 70px); }
        .left-panel { display: grid; grid-template-rows: 1fr auto; gap: 12px; }
        .camera-section, .right-panel { background: rgba(255,255,255,0.95); border-radius: 12px; padding: 15px; box-shadow: 0 8px 32px rgba(0,0,0,0.1); }

        .video-container { position: relative; background: #000; border-radius: 8px; overflow: hidden; height: 100%; border: 2px solid #ddd; display: flex; align-items: stretch; }
        .video-feed { width: 100%; height: 100%; object-fit: cover; display: block; }
        .video-placeholder { display: flex; align-items: center; justify-content: center; width:100%; height:100%; background: linear-gradient(45deg, #34495e, #2c3e50); color: white; font-size: 16px; flex-direction: column; gap: 8px; }

        .controls-panel { display: grid; gap: 12px; }
        .control-group { background: rgba(255,255,255,0.9); padding: 12px; border-radius: 8px; }
        .control-group h4 { margin-bottom: 8px; color: #2c3e50; font-size: 13px; }
        .form-group { margin-bottom: 10px; }
        .form-group label { display: block; margin-bottom: 4px; font-weight: 600; color: #555; font-size: 11px; }
        .form-control { width: 100%; padding: 6px 10px; border: 2px solid #ddd; border-radius: 5px; font-size: 13px; }

        .btn { padding: 8px 16px; border: none; border-radius: 5px; cursor: pointer; font-weight: 600; font-size: 12px; display: inline-flex; align-items: center; gap: 6px; justify-content: center; min-width: 80px; }
        .btn-primary { background: linear-gradient(45deg, #4CAF50, #45a049); color: white; }
        .btn-danger { background: linear-gradient(45deg, #f44336, #d32f2f); color: white; }
        .btn-warning { background: linear-gradient(45deg, #FF9800, #F57C00); color: white; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }

        .tab-navigation { display: flex; background: #f5f5f5; border-radius: 8px; padding: 3px; gap: 3px; }
        .tab-btn { flex: 1; padding: 10px 12px; border: none; border-radius: 6px; background: transparent; color: #666; font-weight: 600; font-size: 12px; cursor: pointer; transition: all 0.3s ease; }
        .tab-btn.active { background: white; color: #2c3e50; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
        .tab-count { background: #4CAF50; color: white; font-size: 10px; font-weight: bold; padding: 1px 5px; border-radius: 8px; margin-left: 4px; }
        .tab-count.unregistered { background: #f44336; }

        .tab-content { display: none; height: 100%; overflow: hidden; }
        .tab-content.active { display: block; }
        .vehicle-list { overflow-y: auto; max-height: 600px; padding-right: 5px; }

        .vehicle-item { display: grid; grid-template-columns: 70px 1fr auto; gap: 12px; padding: 12px; margin-bottom: 10px; background: white; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); border-left: 3px solid #4CAF50; animation: slideIn 0.5s ease; }
        .vehicle-item.unregistered { border-left-color: #f44336; }
        .vehicle-item.exit { border-left-color: #FF9800; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }

        .vehicle-image { width: 70px; height: 50px; object-fit: cover; border-radius: 5px; background: #f5f5f5; border: 1px solid #ddd; }
        .vehicle-details { display: flex; flex-direction: column; justify-content: center; gap: 3px; }
        .plate-number { font-size: 14px; font-weight: bold; color: #2c3e50; font-family: 'Courier New', monospace; }
        .owner-name { font-size: 12px; color: #666; }
        .timestamp { font-size: 10px; color: #999; }
        .vehicle-status { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; }
        .status-badge { padding: 3px 8px; border-radius: 10px; font-size: 10px; font-weight: bold; text-transform: uppercase; }
        .status-in { background: linear-gradient(45deg, #4CAF50, #45a049); color: white; }
        .status-out { background: linear-gradient(45deg, #FF9800, #F57C00); color: white; }

        /* Manual Entry Modal */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); }
        .modal.active { display: flex; align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 25px; border-radius: 12px; width: 90%; max-width: 500px; box-shadow: 0 10px 40px rgba(0,0,0,0.3); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .modal-header h3 { color: #2c3e50; font-size: 18px; }
        .modal-close { background: #f44336; color: white; border: none; border-radius: 50%; width: 30px; height: 30px; cursor: pointer; font-size: 18px; }
        .preview-image { width: 100%; height: 200px; object-fit: contain; background: #f5f5f5; border-radius: 8px; margin-bottom: 15px; border: 2px solid #ddd; }
        .radio-group { display: flex; gap: 20px; margin-bottom: 15px; }
        .radio-label { display: flex; align-items: center; gap: 8px; font-size: 14px; cursor: pointer; }

        .notification { position: fixed; top: 15px; right: 15px; padding: 12px 16px; border-radius: 6px; box-shadow: 0 3px 12px rgba(0,0,0,0.2); z-index: 1000; font-size: 13px; max-width: 350px; animation: slideInRight 0.3s ease; }
        @keyframes slideInRight { from { transform: translateX(400px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .notification.success { background: linear-gradient(45deg, #4CAF50, #45a049); color: white; }
        .notification.error { background: linear-gradient(45deg, #f44336, #d32f2f); color: white; }
        .notification.info { background: linear-gradient(45deg, #2196F3, #1976D2); color: white; }

        .hidden { display: none; }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="logo"><span>🧠</span><span>Smart LPR</span></div>
        <div class="status-bar">
            <div id="cameraStatus" class="status-indicator status-inactive"><span>🔴</span><span>Camera: OFF</span></div>
            <div id="detectionStatus" class="status-indicator status-inactive"><span>⸏</span><span>Detection: OFF</span></div>
            <div id="registeredCount" class="status-indicator status-info"><span>🏢</span><span>Registered: 0</span></div>
            <div id="unregisteredCount" class="status-indicator status-info"><span>🚨</span><span>Visitors: 0</span></div>
        </div>
    </div>

    <!-- Main Container -->
    <div class="main-container">
        <!-- Left Panel -->
        <div class="left-panel">
            <!-- Camera Section -->
            <div class="camera-section">
                <div class="video-container">
                    <div id="videoPlaceholder" class="video-placeholder">
                        <span>🚫</span><span>Camera Not Active</span>
                    </div>
                    <img id="videoFeed" class="video-feed hidden" alt="Video Feed">
                </div>
            </div>

            <!-- Controls Panel -->
            <div class="controls-panel">
                <div class="control-group">
                    <h4>📷 Camera Settings</h4>
                    <div class="form-group">
                        <label>RTSP URL</label>
                        <input type="text" id="rtspUrl" class="form-control" placeholder="rtsp://username:password@ip:port/stream" value="rtsp://admin:Hexbee12@192.168.1.64:554/stream1">
                    </div>
                    <div class="btn-grid">
                        <button id="startCamera" class="btn btn-primary">▶️ Start</button>
                        <button id="stopCamera" class="btn btn-danger">⏹️ Stop</button>
                    </div>
                </div>

                <!-- 🆕 Manual Entry Section -->
                <div class="control-group">
                    <h4>✍️ Manual Entry</h4>
                    <button id="manualCapture" class="btn btn-warning" style="width: 100%;">📸 Capture & Add Manually</button>
                </div>
            </div>
        </div>

        <!-- Right Panel -->
        <div class="right-panel">
            <h3 style="margin-bottom: 12px; color: #2c3e50; font-size: 16px;">🚛 Vehicle Detection</h3>

            <!-- Tab Navigation -->
            <div class="tab-navigation">
                <button class="tab-btn active" data-tab="registered" id="registeredTab">
                    <span>🏢 Registered</span><span class="tab-count" id="registeredTabCount">0</span>
                </button>
                <button class="tab-btn" data-tab="unregistered" id="unregisteredTab">
                    <span>🚨 Visitors</span><span class="tab-count unregistered" id="unregisteredTabCount">0</span>
                </button>
            </div>

            <!-- Registered Vehicles Tab -->
            <div class="tab-content active" id="registeredContent">
                <div class="vehicle-list" id="registeredVehicleList">
                    <div style="text-align: center; color: #666; margin-top: 40px;">
                        <div style="font-size: 40px; opacity: 0.3;">🏢</div>
                        <div style="margin-top: 12px;">No registered vehicles detected</div>
                    </div>
                </div>
            </div>

            <!-- Unregistered Vehicles Tab -->
            <div class="tab-content" id="unregisteredContent">
                <div class="vehicle-list" id="unregisteredVehicleList">
                    <div style="text-align: center; color: #666; margin-top: 40px;">
                        <div style="font-size: 40px; opacity: 0.3;">🚨</div>
                        <div style="margin-top: 12px;">No visitor vehicles detected</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 🆕 Manual Entry Modal -->
    <div id="manualModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>✍️ Manual Plate Entry</h3>
                <button class="modal-close" onclick="closeManualModal()">×</button>
            </div>
            
            <img id="capturePreview" class="preview-image" alt="Captured Frame">
            
            <div class="form-group">
                <label>Plate Number (e.g., MH12AB1234)</label>
                <input type="text" id="manualPlate" class="form-control" placeholder="MH12AB1234" style="text-transform: uppercase;">
            </div>
            
            <div class="form-group">
                <label>Status</label>
                <div class="radio-group">
                    <label class="radio-label">
                        <input type="radio" name="manualStatus" value="IN" checked>
                        <span>🟢 IN (Entry)</span>
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="manualStatus" value="OUT">
                        <span>🟠 OUT (Exit)</span>
                    </label>
                </div>
            </div>
            
            <button id="submitManual" class="btn btn-primary" style="width: 100%;">✅ Submit Entry</button>
        </div>
    </div>

    <script>
        let websocket, cameraActive = false, detectionActive = false;
        let registeredVehicles = new Map(), unregisteredVehicles = new Map(), activeTab = 'registered';

        document.addEventListener('DOMContentLoaded', function() {
            initializeWebSocket();
            bindEventListeners();
            loadVehicles();
        });

        function initializeWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            websocket = new WebSocket(`${protocol}//${window.location.host}/ws`);

            websocket.onmessage = (event) => {
                const message = JSON.parse(event.data);
                if (message.type === 'vehicle_detected') {
                    handleVehicleDetection(message.data);
                }
            };

            websocket.onclose = () => setTimeout(initializeWebSocket, 2000);
        }

        function handleVehicleDetection(vehicleData) {
            if (vehicleData.registered) {
                registeredVehicles.set(vehicleData.plate, vehicleData);
            } else {
                unregisteredVehicles.set(vehicleData.plate, vehicleData);
            }
            
            updateVehicleLists();
            updateVehicleCounts();
            
            const action = vehicleData.status === 'IN' ? 'ENTERED' : 'EXITED';
            const type = vehicleData.registered ? '🏢 Registered' : '🚨 Visitor';
            showNotification(`${type} ${vehicleData.plate} ${action}`, vehicleData.registered ? 'success' : 'info');
        }

        function bindEventListeners() {
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    switchTab(this.getAttribute('data-tab'));
                });
            });

            document.getElementById('startCamera').addEventListener('click', startCamera);
            document.getElementById('stopCamera').addEventListener('click', stopCamera);
            document.getElementById('manualCapture').addEventListener('click', captureForManual);
            document.getElementById('submitManual').addEventListener('click', submitManualEntry);
        }

        async function startCamera() {
            try {
                const rtspUrl = document.getElementById('rtspUrl').value.trim();
                if (!rtspUrl) throw new Error('Please enter RTSP URL');

                const response = await fetch('/camera/start', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ source_type: 'rtsp', rtsp_url: rtspUrl })
                });

                const result = await response.json();
                if (result.success) {
                    showNotification('🎯 Camera Started', 'success');
                    cameraActive = true;
                    updateCameraDisplay();

                    setTimeout(async () => {
                        await fetch('/detection/start', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ interval: 1.5, enabled: true })
                        });
                        detectionActive = true;
                        updateSystemStatus();
                    }, 800);
                }
            } catch (error) {
                showNotification(`❌ ${error.message}`, 'error');
            }
        }

        async function stopCamera() {
            await fetch('/camera/stop', { method: 'POST' });
            cameraActive = false;
            detectionActive = false;
            updateCameraDisplay();
            updateSystemStatus();
        }

        // 🆕 Manual Capture
        async function captureForManual() {
            if (!cameraActive) {
                showNotification('❌ Camera must be active', 'error');
                return;
            }

            try {
                const response = await fetch('/manual/capture', { method: 'POST' });
                const result = await response.json();

                if (result.success) {
                    document.getElementById('capturePreview').src = `data:image/jpeg;base64,${result.image}`;
                    document.getElementById('manualModal').classList.add('active');
                    document.getElementById('manualPlate').value = '';
                    document.getElementById('manualPlate').focus();
                } else {
                    showNotification(`❌ ${result.message}`, 'error');
                }
            } catch (error) {
                showNotification(`❌ Capture failed: ${error.message}`, 'error');
            }
        }

        // 🆕 Submit Manual Entry
        async function submitManualEntry() {
            const plate = document.getElementById('manualPlate').value.trim().toUpperCase();
            const status = document.querySelector('input[name="manualStatus"]:checked').value;

            if (!plate) {
                showNotification('❌ Please enter plate number', 'error');
                return;
            }

            try {
                const response = await fetch('/manual/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ plate_number: plate, status: status })
                });

                const result = await response.json();

                if (result.success) {
                    showNotification(`✅ ${result.message}`, 'success');
                    closeManualModal();
                } else {
                    showNotification(`❌ ${result.message}`, 'error');
                }
            } catch (error) {
                showNotification(`❌ Submit failed: ${error.message}`, 'error');
            }
        }

        function closeManualModal() {
            document.getElementById('manualModal').classList.remove('active');
        }

        function switchTab(tabName) {
            activeTab = tabName;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(tabName + 'Tab').classList.add('active');
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            document.getElementById(tabName + 'Content').classList.add('active');
        }

        function updateVehicleLists() {
            updateRegisteredVehicleList();
            updateUnregisteredVehicleList();
            updateTabCounts();
        }

        function updateRegisteredVehicleList() {
            const list = document.getElementById('registeredVehicleList');
            if (registeredVehicles.size === 0) {
                list.innerHTML = '<div style="text-align: center; color: #666; margin-top: 40px;"><div style="font-size: 40px; opacity: 0.3;">🏢</div><div style="margin-top: 12px;">No registered vehicles</div></div>';
                return;
            }

            const vehicles = Array.from(registeredVehicles.values()).sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
            list.innerHTML = vehicles.map(v => `
                <div class="vehicle-item ${v.status === 'IN' ? '' : 'exit'}">
                    <div class="vehicle-image">${v.image ? `<img src="data:image/jpeg;base64,${v.image}" style="width: 100%; height: 100%; object-fit: cover;">` : '📷'}</div>
                    <div class="vehicle-details">
                        <div class="plate-number">${v.plate}</div>
                        <div class="owner-name">${v.owner}</div>
                        <div class="timestamp">${new Date(v.timestamp).toLocaleString()}</div>
                    </div>
                    <div class="vehicle-status">
                        <div class="status-badge ${v.status === 'IN' ? 'status-in' : 'status-out'}">${v.status}</div>
                    </div>
                </div>
            `).join('');
        }

        function updateUnregisteredVehicleList() {
            const list = document.getElementById('unregisteredVehicleList');
            if (unregisteredVehicles.size === 0) {
                list.innerHTML = '<div style="text-align: center; color: #666; margin-top: 40px;"><div style="font-size: 40px; opacity: 0.3;">🚨</div><div style="margin-top: 12px;">No visitors</div></div>';
                return;
            }

            const vehicles = Array.from(unregisteredVehicles.values()).sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
            list.innerHTML = vehicles.map(v => `
                <div class="vehicle-item unregistered ${v.status === 'IN' ? '' : 'exit'}">
                    <div class="vehicle-image">${v.image ? `<img src="data:image/jpeg;base64,${v.image}" style="width: 100%; height: 100%; object-fit: cover;">` : '📷'}</div>
                    <div class="vehicle-details">
                        <div class="plate-number">${v.plate}</div>
                        <div class="owner-name">Visitor</div>
                        <div class="timestamp">${new Date(v.timestamp).toLocaleString()}</div>
                    </div>
                    <div class="vehicle-status">
                        <div class="status-badge ${v.status === 'IN' ? 'status-in' : 'status-out'}">${v.status}</div>
                    </div>
                </div>
            `).join('');
        }

        function updateTabCounts() {
            document.getElementById('registeredTabCount').textContent = registeredVehicles.size;
            document.getElementById('unregisteredTabCount').textContent = unregisteredVehicles.size;
        }

        function updateVehicleCounts() {
            document.getElementById('registeredCount').innerHTML = `<span>🏢</span><span>Registered: ${registeredVehicles.size}</span>`;
            document.getElementById('unregisteredCount').innerHTML = `<span>🚨</span><span>Visitors: ${unregisteredVehicles.size}</span>`;
        }

        function updateCameraDisplay() {
            const videoFeed = document.getElementById('videoFeed');
            const videoPlaceholder = document.getElementById('videoPlaceholder');

            if (cameraActive) {
                videoFeed.src = '/video_feed?' + new Date().getTime();
                videoFeed.classList.remove('hidden');
                videoPlaceholder.classList.add('hidden');
            } else {
                videoFeed.classList.add('hidden');
                videoPlaceholder.classList.remove('hidden');
            }
        }

        function updateSystemStatus() {
            const cameraStatus = document.getElementById('cameraStatus');
            const detectionStatus = document.getElementById('detectionStatus');

            cameraStatus.className = cameraActive ? 'status-indicator status-active' : 'status-indicator status-inactive';
            cameraStatus.innerHTML = `<span>${cameraActive ? '🟢' : '🔴'}</span><span>Camera: ${cameraActive ? 'LIVE' : 'OFF'}</span>`;

            detectionStatus.className = detectionActive ? 'status-indicator status-active' : 'status-indicator status-inactive';
            detectionStatus.innerHTML = `<span>${detectionActive ? '🧠' : '⸏'}</span><span>Detection: ${detectionActive ? 'ON' : 'OFF'}</span>`;
        }

        function showNotification(message, type = 'info') {
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.textContent = message;
            document.body.appendChild(notification);
            setTimeout(() => notification.remove(), 4000);
        }

        async function loadVehicles() {
            try {
                const response = await fetch('/vehicles');
                const result = await response.json();

                registeredVehicles.clear();
                unregisteredVehicles.clear();

                result.registered_vehicles?.forEach(v => registeredVehicles.set(v.plate, v));
                result.unregistered_vehicles?.forEach(v => unregisteredVehicles.set(v.plate, v));

                updateVehicleLists();
                updateVehicleCounts();
            } catch (error) {
                console.error('Error loading vehicles:', error);
            }
        }
    </script>
</body>
</html>
